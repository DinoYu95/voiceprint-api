# 声纹服务 voiceprint-api 部署：从源码构建（安装 requirements）并启动
# 使用前：在 data/ 下放置 .voiceprint.yaml 配置；可选 cp .env.example .env 修改端口
# 启动：cd deploy && docker compose up -d [--build]
#
# 不设 VOICEPRINT_IMAGE 时使用本地构建；设则拉取该镜像。

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${VOICEPRINT_IMAGE:-voiceprint-api:latest}
    container_name: voiceprint-api
    restart: always
    environment:
      TZ: Asia/Shanghai
      # 覆盖 data/.voiceprint.yaml 中的 MySQL，连宿主机上的 xiaozhi MySQL（宿主机 3306）
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: "3306"
      # 若与 yaml 一致可省略；不一致时在这里指定
      # MYSQL_USER: root
      # MYSQL_PASSWORD: "123456"
      # MYSQL_DATABASE: voiceprint_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8005}:8005"
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./data:/app/data
    networks:
      - voiceprint

networks:
  voiceprint:
    driver: bridge
